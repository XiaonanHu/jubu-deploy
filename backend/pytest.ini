[pytest]
pythonpath = .
# jubu_chat testpaths require the jubu_datastore package (pip install jubu_datastore).
# CI runs only evaluation/data_generation/tests when jubu_datastore is not installed.
testpaths =
    jubu_chat/tests
    jubu_chat/chat/core/tests
    evaluation/data_generation/tests
python_files = test_*.py
python_functions = test_*
markers =
    e2e: End-to-end tests requiring live API keys
    manual: Manual tests requiring external services (LiveKit, Google Cloud, etc.)

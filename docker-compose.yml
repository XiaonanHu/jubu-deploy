# ==========================================================
# Jubu Cloud Deployment — Docker Compose
# ==========================================================
#
# Deploy workflow:
#   cd ~/jubu-deploy && git pull
#   docker compose build --build-arg GITHUB_TOKEN=$GITHUB_TOKEN
#   docker compose up -d
# ==========================================================

services:

  # ──────────────────────────────────────────────
  # Reverse Proxy — TLS termination
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - parent-api
      - livekit
      - grafana
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # SSL Certificate Auto-Renewal
  # ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot;
      sleep 43200 & wait $${!}; done;'
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # LiveKit Server
  # ──────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    command: >
      --config /etc/livekit.yaml
      --node-ip ${PUBLIC_IP}
      --bind 0.0.0.0
    volumes:
      - ./docker/livekit-production.yaml:/etc/livekit.yaml:ro
    environment:
      - "LIVEKIT_KEYS=devkey: devkey-secret-at-least-32-characters!!"
    ports:
      - "7881:7881/tcp"
      - "7882-7982:7882-7982/udp"
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Child-Facing Backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        BACKEND_BRANCH: ${BACKEND_BRANCH:-main}
        DATASTORE_BRANCH: ${DATASTORE_BRANCH:-main}
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=wss://lk.buju.ai
      - DATABASE_URL=postgresql://jubu:${POSTGRES_PASSWORD}@postgres:5432/jubu
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Parent-Facing API
  # ──────────────────────────────────────────────
  parent-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.parent-api
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        PARENT_APP_BRANCH: ${PARENT_APP_BRANCH:-main}
        DATASTORE_BRANCH: ${DATASTORE_BRANCH:-main}
    env_file:
      - .env
    environment:
      - DATABASE_URI=postgresql://jubu:${POSTGRES_PASSWORD}@postgres:5432/jubu
    volumes:
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: jubu
      POSTGRES_USER: jubu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GRAFANA_RO_PASSWORD: ${GRAFANA_RO_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Postgres runs everything in /docker-entrypoint-initdb.d/ once, on the
      # FIRST boot only.  Idempotent re-runs require a fresh volume; on existing
      # deployments, run `docker exec -i postgres psql -U jubu -d jubu < init/01-grafana-ro.sql`
      # by hand the first time.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jubu"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Grafana — internal observability dashboard
  # ──────────────────────────────────────────────
  # Hosted at https://stats.buju.ai (nginx + LetsEncrypt).  Reads from
  # Postgres via a read-only grafana_ro role (created by the init SQL above)
  # so the dashboard physically cannot mutate state.
  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://stats.buju.ai
      # nginx terminates TLS and adds basic-auth; Grafana itself stays on HTTP
      # bound to the docker network, never exposed externally.
      GF_SERVER_HTTP_PORT: "3000"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Datasource provisioning reads this for the postgres password.
      GRAFANA_RO_PASSWORD: ${GRAFANA_RO_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  certbot-webroot:
  certbot-certs:
  grafana-data:

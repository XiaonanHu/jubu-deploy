server {
    listen 443 ssl;
    server_name api.buju.ai;
    ssl_certificate /etc/letsencrypt/live/api.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buju.ai/privkey.pem;
    location / {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    server_name app.buju.ai;
    ssl_certificate /etc/letsencrypt/live/app.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.buju.ai/privkey.pem;
    location / {
        proxy_pass http://parent-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name lk.buju.ai;
    ssl_certificate /etc/letsencrypt/live/lk.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.buju.ai/privkey.pem;
    location / {
        proxy_pass http://livekit:7880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 443 ssl;
    server_name stats.buju.ai;
    ssl_certificate /etc/letsencrypt/live/stats.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stats.buju.ai/privkey.pem;

    # Phase 0 gate: shared admin password.  Phase 3 swaps this for an
    # auth_request directive against parent-api session cookies.
    auth_basic "Buju Stats";
    auth_basic_user_file /etc/nginx/htpasswd;

    # Phase 2: live SSE conversation viewer — proxied to stats_api on the backend.
    # Must appear before `location /` so it takes priority.
    location /stream/ {
        proxy_pass http://backend:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE requires no buffering and a persistent connection.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /viewer/ {
        proxy_pass http://backend:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Grafana Live (live-reloading panels) uses websockets.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name api.buju.ai app.buju.ai lk.buju.ai stats.buju.ai;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

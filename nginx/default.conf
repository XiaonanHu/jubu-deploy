# ==========================================================
# Nginx — TLS + Reverse Proxy
#
# api.buju.ai     → backend:8001    (child-facing LiveKit API)
# app.buju.ai     → parent-api:8000 (parent-facing REST API)
# lk.buju.ai      → livekit:7880    (LiveKit signaling)
# ==========================================================

# ── Child-Facing Backend API ──
server {
    listen 443 ssl http2;
    server_name api.buju.ai;

    ssl_certificate     /etc/letsencrypt/live/api.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buju.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── Parent-Facing API ──
server {
    listen 443 ssl http2;
    server_name app.buju.ai;

    ssl_certificate     /etc/letsencrypt/live/app.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.buju.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS headers for React Native app
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    location / {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        proxy_pass http://parent-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── LiveKit Signaling ──
server {
    listen 443 ssl http2;
    server_name lk.buju.ai;

    ssl_certificate     /etc/letsencrypt/live/lk.buju.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.buju.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://livekit:7880;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket — critical for LiveKit
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ── HTTP → HTTPS redirect + ACME challenge ──
server {
    listen 80;
    server_name api.buju.ai app.buju.ai lk.buju.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

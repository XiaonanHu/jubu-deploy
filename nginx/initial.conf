# HTTP-only config — used during initial SSL certificate setup
# Replace with default.conf AFTER running setup-ssl.sh

server {
    listen 80;
    server_name api.buju.ai app.buju.ai lk.buju.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Jubu server running — SSL setup pending.';
        add_header Content-Type text/plain;
    }
}

# LiveKit Production Configuration
# Keys are injected via LIVEKIT_KEYS env var in docker-compose

port: 7880
log_level: info

bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  port_range_start: 7882
  port_range_end: 7982
  # use_external_ip: LiveKit auto-detects public IP in cloud
  use_external_ip: true
